services:
  # Web Service (Django + Gunicorn)
  - type: web
    name: offer-letter-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn --workers 2 --timeout 60 offer_automation.wsgi:application
    healthCheckPath: /admin/
    envVars:
      - key: REDIS_URL
        fromService:
          name: offer-letter-redis
          type: redis
          property: connectionString

  # Celery Worker Service
  - type: worker
    name: offer-letter-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A offer_automation worker --loglevel=info --concurrency=2
    envVars:
      - key: REDIS_URL
        fromService:
          name: offer-letter-redis
          type: redis
          property: connectionString

  # Redis Service
  - type: redis
    name: offer-letter-redis
    plan: free
    ipAllowList: []
